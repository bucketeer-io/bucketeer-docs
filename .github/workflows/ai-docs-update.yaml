name: ai-docs-update

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Source issue number from bucketeer repo'
        required: true
        type: string
      pr_numbers:
        description: 'PR numbers (comma-separated, e.g. "123" or "123,456,789")'
        required: false
        type: string

# Prevent concurrent runs - prioritize earlier jobs
concurrency:
  group: ai-docs-update
  cancel-in-progress: false

jobs:
  ai-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout bucketeer-docs
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Fetch issue and PR context from bucketeer repo
        id: context
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_PAT }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_PR_NUMBERS: ${{ inputs.pr_numbers }}
        run: |
          # Validate inputs
          if ! [[ "$INPUT_ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid issue number: ${INPUT_ISSUE_NUMBER}"
            exit 1
          fi
          if [[ -n "$INPUT_PR_NUMBERS" ]] && ! [[ "$INPUT_PR_NUMBERS" =~ ^[0-9]+(,[[:space:]]*[0-9]+)*$ ]]; then
            echo "::error::Invalid PR numbers format: ${INPUT_PR_NUMBERS}"
            exit 1
          fi
          mkdir -p .ai-context
          echo "issue_number=${INPUT_ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          echo "pr_numbers=${INPUT_PR_NUMBERS}" >> $GITHUB_OUTPUT

          # Fetch issue information
          gh api "/repos/bucketeer-io/bucketeer/issues/${INPUT_ISSUE_NUMBER}" \
            --jq '.title' > .ai-context/issue_title.txt

          gh api "/repos/bucketeer-io/bucketeer/issues/${INPUT_ISSUE_NUMBER}" \
            --jq '.body // ""' > .ai-context/issue_body.txt

          echo "Fetched issue #${INPUT_ISSUE_NUMBER}: $(cat .ai-context/issue_title.txt)"

          # Initialize PR context files
          > .ai-context/pr_title.txt
          > .ai-context/pr_body.txt
          > .ai-context/diff.patch

          # Fetch PR information and diff for each PR (comma-separated)
          if [ -n "$INPUT_PR_NUMBERS" ]; then
            for PR_NUMBER in $(echo "$INPUT_PR_NUMBERS" | tr ',' ' '); do
              PR_NUMBER="${PR_NUMBER// /}"
              echo "Fetching PR #${PR_NUMBER}..."

              echo "--- PR #${PR_NUMBER} ---" >> .ai-context/pr_title.txt
              gh api "/repos/bucketeer-io/bucketeer/pulls/${PR_NUMBER}" \
                --jq '.title' >> .ai-context/pr_title.txt

              echo "--- PR #${PR_NUMBER} ---" >> .ai-context/pr_body.txt
              gh api "/repos/bucketeer-io/bucketeer/pulls/${PR_NUMBER}" \
                --jq '.body // ""' >> .ai-context/pr_body.txt
              echo "" >> .ai-context/pr_body.txt

              gh api "/repos/bucketeer-io/bucketeer/pulls/${PR_NUMBER}" \
                -H "Accept: application/vnd.github.diff" >> .ai-context/diff.patch \
                || echo "::warning::Failed to fetch diff for PR #${PR_NUMBER}"

              echo "Fetched PR #${PR_NUMBER}"
            done
          else
            echo "No PR numbers provided"
          fi

          # Log diff size
          DIFF_SIZE=$(wc -c < .ai-context/diff.patch | tr -d ' ')
          echo "Diff size: ${DIFF_SIZE} bytes"

      - name: Run AI docs update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          cd tools/ai-docs-update
          go build -o ai-docs-update .
          ./ai-docs-update \
            --issue-title-file=../../.ai-context/issue_title.txt \
            --issue-body-file=../../.ai-context/issue_body.txt \
            --pr-title-file=../../.ai-context/pr_title.txt \
            --pr-body-file=../../.ai-context/pr_body.txt \
            --diff-file=../../.ai-context/diff.patch \
            --glossary-file=../../static/data/vocabulary/vocabulary.json \
            --docs-dir=../../docs

      - name: Read issue body for PR description
        id: issue_body
        run: |
          if [ -f .ai-context/issue_body.txt ]; then
            DELIMITER="ISSUEBODY_$(head -c 16 /dev/urandom | xxd -p)"
            {
              echo "content<<${DELIMITER}"
              cat .ai-context/issue_body.txt
              echo "${DELIMITER}"
            } >> $GITHUB_OUTPUT
          fi

      - name: Clean up temporary context files
        if: always()
        run: rm -rf .ai-context

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No documentation changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Documentation changes detected:"
            git diff --stat
          fi

      - name: Build validation
        if: steps.check.outputs.has_changes == 'true'
        run: yarn build

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          committer: bucketeer-bot <bucketeer-bot@users.noreply.github.com>
          author: bucketeer-bot <bucketeer-bot@users.noreply.github.com>
          branch: bot/ai-docs/issue-${{ steps.context.outputs.issue_number }}
          title: "docs: update for issue #${{ steps.context.outputs.issue_number }}"
          body: |
            ## Summary
            Auto-generated documentation updates based on changes in the bucketeer repository.

            ## Source
            - Issue: bucketeer-io/bucketeer#${{ steps.context.outputs.issue_number }}
            - PRs: ${{ steps.context.outputs.pr_numbers || 'N/A' }}

            ## Issue Description
            ${{ steps.issue_body.outputs.content }}

            ## Validation
            - [x] `yarn build` passed

            ---
            > Generated by AI Docs Update workflow
          labels: |
            ai-generated
            documentation
          commit-message: "docs: auto-update for issue #${{ steps.context.outputs.issue_number }}"
          delete-branch: true
